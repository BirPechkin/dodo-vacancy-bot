name: Dodo Vacancy Bot

on:
  schedule:
    - cron: "*/20 * * * *"

  workflow_dispatch:


jobs:

  run-bot:

    runs-on: ubuntu-latest


    steps:

      - name: Checkout
        uses: actions/checkout@v4


      - name: Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"


      - name: Install
        run: |
          pip install -r requirements.txt


      - name: Run bot
        run: |
          python main.py
